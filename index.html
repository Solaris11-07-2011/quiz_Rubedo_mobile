	function get10UniqueNumbers(x) {
  const arr = [];

  // 1. créer [0, 1, 2, ..., x]
  for (let i = 0; i <= x; i++) {
    arr.push(i);
  }

  // 2. mélanger (Fisher-Yates)
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  // 3. prendre 10 premiers
  return arr.slice(0, 10);
}
		function get4UniqueNumbers(x) {
  const arr = [];

  // 1. créer [0, 1, 2, ..., x]
  for (let i = 1; i <= x; i++) {
    arr.push(i);
  }

  // 2. mélanger (Fisher-Yates)
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  // 3. prendre 10 premiers
  return arr.slice(0, 4);
}
